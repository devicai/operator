services:
  app:
    build: .
    ports:
      - "127.0.0.1:${PORT:-3200}:3200"
      # Public ingress proxy (routes <id>.sandbox.devic.ai to running sandboxes).
      # Bound to localhost; Caddy on the host terminates TLS and forwards here.
      - "127.0.0.1:${INGRESS_PORT:-3201}:8080"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - snapshots-data:/root/.devic-sandbox/snapshots
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URI=${DATABASE_URI:-mongodb://mongo:27017/devic-sandbox}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5174}:80"
    depends_on:
      - app

  # --- Infrastructure (optional, use --profile infra) ---

  mongo:
    image: mongo:7
    profiles: [infra]
    # `mongod` runs as PID 1 and is not an init: it never reap()s the orphaned
    # `mongosh` processes the healthcheck spawns, so each one lingers as a
    # <defunct> zombie (one every interval, 1000+ observed) — churning CPU and
    # filling the host PID table, which makes sysbox sandbox creation flaky.
    # `init: true` runs tini as PID 1 to reap them. interval 30s also cuts churn.
    init: true
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: [infra]
    # Same orphan->zombie pattern as mongo: `redis-server` is PID 1 and the
    # `redis-cli` healthcheck processes reparent to it without being reaped.
    init: true
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 30s
      timeout: 5s
      retries: 5

  microsandbox:
    image: microsandbox/microsandbox:latest
    profiles: [infra]
    privileged: true
    ports:
      - "5555:5555"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  mongo-data:
  redis-data:
  snapshots-data:
