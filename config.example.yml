server:
  port: 3200
  basePath: /api/v1
  cors:
    enabled: true
    origins:
      - http://localhost:5174

database:
  provider: mongodb
  uri: ${DATABASE_URI:-mongodb://localhost:27017/devic-sandbox}

redis:
  url: ${REDIS_URL:-redis://localhost:6379}

# Default values applied when create / restore requests omit them.
# Shared by all runtime backends.
defaults:
  defaultImage: node:24
  defaultCpus: 1
  defaultMemoryMib: 256
  defaultTtlSeconds: 1800
  maxTtlSeconds: 7200
  ttlCheckIntervalMs: 30000

# Runtime backend that executes sandboxes.
#
#   microsandbox  — libkrun microVMs. Strongest isolation. Requires /dev/kvm
#                   on the host (bare metal or VPS with nested virtualization).
#
#   docker        — runs sandboxes as Docker containers. No KVM required.
#                   Use sysbox-runc on the host for production-grade isolation
#                   (https://github.com/nestybox/sysbox).
runtime:
  type: ${SANDBOX_RUNTIME:-microsandbox}

  docker:
    socketPath: /var/run/docker.sock
    runtime: sysbox-runc          # sysbox-runc | runc
    network: bridge               # used when networkPolicy=allow-all

    # Publish a sandbox port directly on the host via the `ports` map.
    # Disabled by default: public exposure goes through the ingress proxy, which
    # never needs a host port. Enable only for direct raw-TCP host publishing;
    # when enabled, host ports are validated (>1024) and bound to 127.0.0.1.
    allowHostPortPublishing: false

    # Image admission policy. The allowlist below ships populated with the common
    # Docker Official Images and major public registries. An empty list allows
    # any image. Entries match by exact repo, `prefix/` (directory) or `prefix*`.
    images:
      allowlist:
        - node
        - python
        - debian
        - ubuntu
        - alpine
        - busybox
        - bash
        - golang
        - rust
        - ruby
        - php
        - openjdk
        - eclipse-temurin
        - gcc
        - docker.io/library/*
        - mcr.microsoft.com/*
        - ghcr.io/*
        - gcr.io/*
        - public.ecr.aws/*
        - registry.k8s.io/*
        - quay.io/*
      # Reject images whose on-disk size exceeds this (bytes). 0 = no limit.
      maxSizeBytes: 0

    hardening:
      dropAllCaps: true
      noNewPrivileges: true
      readOnlyRootfs: false       # most workloads (apt, npm install) break with this
      pidsLimit: 512
      # 'default' (daemon profile) | 'unconfined' | path to a JSON profile.
      # See security/README.md. The default profile + dropped caps already block
      # most escapes; disable io_uring on the host for the main residual:
      #   echo 'kernel.io_uring_disabled = 2' | sudo tee /etc/sysctl.d/99-io_uring.conf
      seccompProfile: default
      # AppArmor profile applied to each sandbox. Skipped automatically (with a
      # warning) on hosts without AppArmor. '' or 'unconfined' to disable.
      apparmorProfile: docker-default
      # Run the sandbox as this user[:group] (e.g. '1000:1000'). Empty keeps the
      # image default (usually root). With sysbox-runc root is already remapped
      # to an unprivileged host uid; set this mainly for the plain runc fallback.
      runAsUser: ''

# Hard caps applied module-wide (across all tenants).
# Omit a field or set it to 0 to disable that specific limit.
resourceLimits:
  # Sum of memoryMib for sandboxes in pending/creating/running/stopping state.
  # New sandboxes (and snapshot restores) are rejected when the projected total
  # would exceed this value.
  maxTotalMemoryMib: 8192
  # Sum of sizeBytes for snapshots in 'ready' state.
  # New snapshots are rejected once total disk usage reaches this value.
  maxTotalDiskBytes: 21474836480  # 20 GiB

# Pre-warmed pool of restored sandboxes, ready to be claimed instantly.
# The pool reserves a slice of `resourceLimits.maxTotalMemoryMib` proportional
# to `memoryReservePercent`. Reserved capacity (occupied by running hot sandboxes
# plus any unfilled hot slots) is unavailable for on-demand sandboxes.
#
# All values are persisted in MongoDB on first start and can be edited live
# from the frontend Settings page (changes take effect on the next reconcile).
hotPool:
  enabled: false
  # Snapshot every hot sandbox is restored from.
  snapshotId: ""
  # Percentage of maxTotalMemoryMib to reserve (0–100).
  memoryReservePercent: 25
  # Resources of each individual hot sandbox.
  memoryMibPerSandbox: 512
  cpus: 1
  # Pool sizing bounds.
  # `minSize` is the floor: at least this many pods are kept warm even if the
  # percent calculation rounds down. `maxSize` is an optional safety ceiling —
  # leave it unset to let `memoryReservePercent` × `memoryMibPerSandbox` be
  # the only cap. Set it only if you want a hard limit independent of the
  # percent reserve.
  minSize: 0
  # maxSize: 20
  # Reconcile cadence (ms).
  reconcileIntervalMs: 15000

# Public ingress — expose each running sandbox at <sandboxId>.<wildcardDomain>.
# An embedded reverse proxy listens on `proxyPort` and routes by Host header
# to the sandbox's internal HTTP port (`defaultUpstreamPort`, default 80).
#
# Security model:
#   When ingress is enabled and runtime.type=docker, every sandbox runs on
#   its own bridge network (`devic-<sandboxName>`) — sandboxes cannot reach
#   each other, mongo, redis or the api server. The `app` container is
#   transparently connected to each sandbox's bridge at publish time and
#   disconnected at unpublish, so only the proxy can route to them.
#
#   To do this `app` must be able to identify itself in Docker. By default
#   it reads `/etc/hostname` (Docker writes the container short ID there).
#   Override with the env var `DEVIC_SANDBOX_SELF_CONTAINER` if your
#   deployment changes the hostname (e.g. behind kubernetes).
#
# Operator responsibilities:
#   1. DNS: a wildcard A/AAAA record `*.<wildcardDomain>` pointing to this host.
#   2. TLS: terminated upstream (Cloudflare / CDN / external LB). The proxy
#      itself only speaks HTTP — never expose `proxyPort` directly to the
#      internet without a TLS-terminating reverse proxy in front.
ingress:
  enabled: false
  wildcardDomain: sandbox.devic.ai
  publicScheme: https
  proxyPort: 8080
  proxyHost: 0.0.0.0
  defaultUpstreamPort: 80
  upstreamTimeoutMs: 30000

mcp:
  enabled: true

auth:
  # Set to true to require an API key on every /api/v1/* request.
  # Provide the key via SANDBOX_API_KEY in .env. The frontend Settings page
  # lets users save the same key in localStorage so it is sent automatically.
  enabled: false
  strategy: api-key
  apiKeys:
    - name: devic-backend
      key: ${SANDBOX_API_KEY:-dev-key-local}

extensions:
  properties: []
  # When integrated with Devic, uncomment:
  # properties:
  #   - name: clientUID
  #     type: string
  #     required: true
  #     index: true
  #     entities: "*"
  #     source: header
  #     headerName: x-client-uid

logging:
  level: debug
  format: pretty
