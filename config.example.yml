server:
  port: 3200
  basePath: /api/v1
  cors:
    enabled: true
    origins:
      - http://localhost:5174

database:
  provider: mongodb
  uri: ${DATABASE_URI:-mongodb://localhost:27017/devic-sandbox}

redis:
  url: ${REDIS_URL:-redis://localhost:6379}

# Default values applied when create / restore requests omit them.
# Shared by all runtime backends.
defaults:
  defaultImage: node:24
  defaultCpus: 1
  defaultMemoryMib: 256
  defaultTtlSeconds: 1800
  maxTtlSeconds: 7200
  ttlCheckIntervalMs: 30000

# Runtime backend that executes sandboxes.
#
#   microsandbox  — libkrun microVMs. Strongest isolation. Requires /dev/kvm
#                   on the host (bare metal or VPS with nested virtualization).
#
#   docker        — runs sandboxes as Docker containers. No KVM required.
#                   Use sysbox-runc on the host for production-grade isolation
#                   (https://github.com/nestybox/sysbox).
runtime:
  type: ${SANDBOX_RUNTIME:-microsandbox}

  docker:
    socketPath: /var/run/docker.sock
    runtime: sysbox-runc          # sysbox-runc | runc
    network: bridge               # used when networkPolicy=allow-all
    hardening:
      dropAllCaps: true
      noNewPrivileges: true
      readOnlyRootfs: false       # most workloads (apt, npm install) break with this
      seccompProfile: default
      pidsLimit: 512

# Hard caps applied module-wide (across all tenants).
# Omit a field or set it to 0 to disable that specific limit.
resourceLimits:
  # Sum of memoryMib for sandboxes in pending/creating/running/stopping state.
  # New sandboxes (and snapshot restores) are rejected when the projected total
  # would exceed this value.
  maxTotalMemoryMib: 8192
  # Sum of sizeBytes for snapshots in 'ready' state.
  # New snapshots are rejected once total disk usage reaches this value.
  maxTotalDiskBytes: 21474836480  # 20 GiB

# Pre-warmed pool of restored sandboxes, ready to be claimed instantly.
# The pool reserves a slice of `resourceLimits.maxTotalMemoryMib` proportional
# to `memoryReservePercent`. Reserved capacity (occupied by running hot sandboxes
# plus any unfilled hot slots) is unavailable for on-demand sandboxes.
#
# All values are persisted in MongoDB on first start and can be edited live
# from the frontend Settings page (changes take effect on the next reconcile).
hotPool:
  enabled: false
  # Snapshot every hot sandbox is restored from.
  snapshotId: ""
  # Percentage of maxTotalMemoryMib to reserve (0–100).
  memoryReservePercent: 25
  # Resources of each individual hot sandbox.
  memoryMibPerSandbox: 512
  cpus: 1
  # Pool sizing bounds.
  # `minSize` is the floor: at least this many pods are kept warm even if the
  # percent calculation rounds down. `maxSize` is an optional safety ceiling —
  # leave it unset to let `memoryReservePercent` × `memoryMibPerSandbox` be
  # the only cap. Set it only if you want a hard limit independent of the
  # percent reserve.
  minSize: 0
  # maxSize: 20
  # Reconcile cadence (ms).
  reconcileIntervalMs: 15000

mcp:
  enabled: true

auth:
  # Set to true to require an API key on every /api/v1/* request.
  # Provide the key via SANDBOX_API_KEY in .env. The frontend Settings page
  # lets users save the same key in localStorage so it is sent automatically.
  enabled: false
  strategy: api-key
  apiKeys:
    - name: devic-backend
      key: ${SANDBOX_API_KEY:-dev-key-local}

extensions:
  properties: []
  # When integrated with Devic, uncomment:
  # properties:
  #   - name: clientUID
  #     type: string
  #     required: true
  #     index: true
  #     entities: "*"
  #     source: header
  #     headerName: x-client-uid

logging:
  level: debug
  format: pretty
